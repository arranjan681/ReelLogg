{% extends 'base.html' %}
{% block content %}
<h2>Welcome, {{ current_user.username }}!</h2>
<div class="row mt-4">
    <div class="col-md-6">
        <div class="card p-3">
            <h4>Total Watched Movies</h4>
            <p>{{ total_movies }}</p>
        </div>
    </div>
    <div class="col-md-6">
        <div class="card p-3">
            <h4>Total Watchlist Movies</h4>
            <p>{{ total_watchlist }}</p>
        </div>
    </div>
</div>
{% endblock %}
